basePath: /api/v1
definitions:
  dto.CreateAccountRequest:
    properties:
      color:
        type: string
      currency:
        type: string
      icon:
        type: string
      initialBalance:
        type: number
      name:
        type: string
      note:
        type: string
      type:
        enum:
        - asset
        - liability
        type: string
    required:
    - name
    - type
    type: object
  dto.CreateCategoryRequest:
    properties:
      color:
        type: string
      icon:
        type: string
      name:
        type: string
      note:
        type: string
      sortOrder:
        type: integer
      type:
        enum:
        - income
        - expense
        - transfer
        type: string
    required:
    - name
    - type
    type: object
  dto.CreateScheduledRequest:
    properties:
      accountId:
        type: string
      amount:
        type: number
      categoryId:
        type: string
      frequency:
        enum:
        - daily
        - weekly
        - monthly
        - yearly
        type: string
      isActive:
        type: boolean
      name:
        type: string
      nextRun:
        type: string
      note:
        type: string
      targetAccountId:
        type: string
      type:
        enum:
        - income
        - expense
        - transfer
        type: string
    required:
    - accountId
    - amount
    - categoryId
    - frequency
    - name
    - nextRun
    - type
    type: object
  dto.CreateTagRequest:
    properties:
      color:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  dto.CreateTransactionRequest:
    properties:
      accountId:
        type: string
      amount:
        type: number
      categoryId:
        type: string
      date:
        type: string
      note:
        type: string
      tagIds:
        items:
          type: string
        type: array
      targetAccountId:
        type: string
      type:
        enum:
        - income
        - expense
        - transfer
        type: string
    required:
    - accountId
    - amount
    - categoryId
    - date
    - type
    type: object
  dto.Response:
    properties:
      data: {}
      error:
        type: string
      meta: {}
      msg:
        type: string
      success:
        type: boolean
    type: object
  dto.UpdateAccountRequest:
    properties:
      color:
        type: string
      currency:
        type: string
      icon:
        type: string
      initialBalance:
        type: number
      name:
        type: string
      note:
        type: string
      type:
        enum:
        - asset
        - liability
        type: string
    required:
    - name
    - type
    type: object
  dto.UpdateCategoryRequest:
    properties:
      color:
        type: string
      icon:
        type: string
      name:
        type: string
      note:
        type: string
      sortOrder:
        type: integer
      type:
        enum:
        - income
        - expense
        - transfer
        type: string
    required:
    - name
    - type
    type: object
  dto.UpdateScheduledRequest:
    properties:
      accountId:
        type: string
      amount:
        type: number
      categoryId:
        type: string
      frequency:
        enum:
        - daily
        - weekly
        - monthly
        - yearly
        type: string
      isActive:
        type: boolean
      name:
        type: string
      nextRun:
        type: string
      note:
        type: string
      targetAccountId:
        type: string
      type:
        enum:
        - income
        - expense
        - transfer
        type: string
    required:
    - accountId
    - amount
    - categoryId
    - frequency
    - name
    - nextRun
    - type
    type: object
  dto.UpdateTagRequest:
    properties:
      color:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  dto.UpdateTransactionRequest:
    properties:
      accountId:
        type: string
      amount:
        type: number
      categoryId:
        type: string
      date:
        type: string
      note:
        type: string
      tagIds:
        items:
          type: string
        type: array
      targetAccountId:
        type: string
      type:
        enum:
        - income
        - expense
        - transfer
        type: string
    required:
    - accountId
    - amount
    - categoryId
    - date
    - type
    type: object
  handler.LoginRequest:
    properties:
      password:
        example: secret123
        type: string
      username:
        example: johndoe
        type: string
    required:
    - password
    - username
    type: object
  handler.RegisterRequest:
    properties:
      email:
        example: john@example.com
        type: string
      password:
        example: secret123
        minLength: 6
        type: string
      username:
        example: johndoe
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
