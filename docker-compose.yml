version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: finvera_postgres
    environment:
      POSTGRES_USER: finvera
      POSTGRES_PASSWORD: finvera_password
      POSTGRES_DB: finvera_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
