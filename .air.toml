# Air - Live Reload for Go
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  # Entry point aplikasi
  cmd = "go build -o ./tmp/main.exe ./cmd/server/main.go"
  entrypoint = "./tmp/main.exe"
  # Delay setelah file berubah (milliseconds)
  delay = 1000
  # Ekstensi file yang dipantau
  include_ext = ["go", "tpl", "tmpl", "html"]
  # Folder yang diabaikan
  exclude_dir = ["assets", "tmp", "vendor", "docs"]
  # Exclude file yang tidak berubah
  exclude_unchanged = true
  follow_symlink = false
  log = "air.log"
  kill_delay = "0s"
  stop_on_error = true

[log]
  time = true
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
  keep_scroll = true
